name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - alpha

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Run linter
        run: yarn lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Install UI Library dev dependencies
        run: cd packages/ui-library && npm install --legacy-peer-deps

      - name: Run type check
        run: yarn typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Install UI Library dev dependencies
        run: cd packages/ui-library && npm install --legacy-peer-deps

      - name: Build packages
        run: yarn lerna-build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Install UI Library dev dependencies
        run: cd packages/ui-library && npm install --legacy-peer-deps

      - name: Run tests
        run: cd packages/ui-library && npm run test
